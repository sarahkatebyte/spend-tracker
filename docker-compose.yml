version: "3.8"

# Reasoning Layer - local development stack
#
# Starts a single-node Elasticsearch instance + the reasoning layer CLI.
# No Elastic Cloud account needed — everything runs locally.
#
# Usage:
#   docker compose up          # start ES in the background
#   docker compose run cli viz  # ASCII cost/savings charts
#   docker compose run cli stats
#   docker compose run cli search "summarize recent messages"
#   docker compose run cli suggest "file memory notes"
#
# ES is available at http://localhost:9200 while the stack is running.

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: reasoning-layer-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # no auth needed for local dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m    # keep memory footprint small
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  cli:
    build: .
    container_name: reasoning-layer-cli
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      # Point at the local ES container - no API key needed (security disabled)
      - ES_HOST=http://elasticsearch:9200
      - ES_API_KEY=
    volumes:
      - ./spend.db:/app/spend.db          # mount your existing SQLite data
      - ./compressor_config.yaml:/app/compressor_config.yaml  # optional: custom config
    stdin_open: true
    tty: true
    # Default: show the viz dashboard
    command: ["python3", "rl.py", "viz"]

volumes:
  es_data:
    driver: local
